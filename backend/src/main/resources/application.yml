# ============================================================
# 订票聊天 Demo - 后端配置
# ============================================================

spring:
  application:
    name: booking-demo

  # H2 内存数据库配置
  datasource:
    url: jdbc:h2:mem:bookingdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # JPA / Hibernate 配置
  jpa:
    hibernate:
      ddl-auto: create-drop   # 每次启动重建表（demo 用）
    show-sql: true            # 控制台打印 SQL，便于学习
    defer-datasource-initialization: true  # 等表建好再执行 data.sql

  # 启动时执行 data.sql 插入种子数据
  sql:
    init:
      mode: always

  # Spring AI - DeepSeek 大模型配置
  ai:
    deepseek:
      # API Key 从环境变量读取，绝不写死在代码里
      api-key: ${DEEPSEEK_API_KEY:}
      chat:
        options:
          # deepseek-chat 支持 function calling（Tool Calling）
          model: deepseek-chat
          # 低温度 → 更稳定地选择工具，减少编造结果
          temperature: 0.1

# 服务端口
server:
  port: 8080

# 日志级别：Tool 调用日志用 INFO 即可观察 ReAct
logging:
  level:
    com.demo.booking.tools: INFO
    com.demo.booking.service.ChatService: INFO
