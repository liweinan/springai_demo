# ============================================================
# 订票聊天 Demo - 后端配置
# ============================================================

spring:
  application:
    name: booking-demo

  # H2 内存数据库配置
  datasource:
    url: jdbc:h2:mem:bookingdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # JPA / Hibernate 配置
  jpa:
    hibernate:
      ddl-auto: create-drop   # 每次启动重建表（demo 用）
    show-sql: true            # 控制台打印 SQL，便于学习
    defer-datasource-initialization: true  # 等表建好再执行 data.sql

  # 启动时执行 data.sql 插入种子数据
  sql:
    init:
      mode: always

  # Spring AI 2.0 - DeepSeek 大模型配置（需 Spring Boot 4.x）
  ai:
    deepseek:
      # API Key 从环境变量读取，绝不写死在代码里
      api-key: ${DEEPSEEK_API_KEY:}
      chat:
        options:
          # deepseek-chat 支持 function calling（Tool Calling）
          model: deepseek-chat
          # 低温度 → 更稳定地选择工具，减少编造结果
          temperature: 0.1
    # 2.0：defaultTools 时 ToolCallingAdvisor 默认自动注册（spring.ai.chat.client.tool-calling.enabled=true）
    # 本 Demo 在 ChatConfig 用 PromptLoggingAdvisor 观察每步 Prompt/Response，无需额外配置

# 服务端口
server:
  port: 8080

# 日志级别
# - INFO：ReAct 每步 messages / Response、Tool 被调用
# - DEBUG：PromptLoggingAdvisor 打印注册的工具 schema（options → API tools 字段，不在 messages 里）
#   勿在此处单独把 PromptLoggingAdvisor 设为 INFO，否则会覆盖 Docker 的 LOGGING_LEVEL_COM_DEMO_BOOKING=DEBUG
#   本地默认 com.demo.booking=INFO；Docker Compose 通过环境变量改为 DEBUG
logging:
  level:
    com.demo.booking: INFO
    org.springframework.ai: INFO
