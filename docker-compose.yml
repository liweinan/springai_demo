# 一键启动前后端（开发模式）
#
# 用法：
#   export DEEPSEEK_API_KEY=your-key
#   docker compose up --build
#
# 或复制 .env.example 为 .env 填入 Key 后：
#   docker compose up --build
#
# 前端 http://localhost:5173  后端 http://localhost:8080
#
# 日志：backend 默认 DEBUG，可看到 PromptLoggingAdvisor 打印的 tools schema
#       （工具在 API tools 字段，不在 messages 里 — 见 PromptLoggingAdvisor 类注释）
#
# JDWP 远程调试（IDE Attach 到 localhost:5005）：
#   JDWP_ENABLED=true docker compose up --build
#   或在 .env 中设置 JDWP_ENABLED=true
#   JDWP_SUSPEND=y 时 JVM 会等待调试器连接后再启动（healthcheck 会 pending）

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
      - "${JDWP_PORT:-5005}:${JDWP_PORT:-5005}"
    environment:
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      # 覆盖 application.yml 的 com.demo.booking=INFO；勿在 yml 里单独锁死 PromptLoggingAdvisor 为 INFO
      LOGGING_LEVEL_COM_DEMO_BOOKING: DEBUG
      LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_AI: DEBUG
      # JDWP 远程调试：JDWP_ENABLED=true 后 IDE Attach localhost:5005
      JDWP_ENABLED: ${JDWP_ENABLED:-false}
      JDWP_PORT: ${JDWP_PORT:-5005}
      JDWP_SUSPEND: ${JDWP_SUSPEND:-n}

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "5173:5173"
    environment:
      # Vite 容器内通过服务名访问 backend
      VITE_API_PROXY_TARGET: http://backend:8080
    depends_on:
      backend:
        condition: service_healthy
